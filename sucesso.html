<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Inscrição Confirmada</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #020617, #0f172a);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border: 1px solid #334155;
      animation: fadeIn 0.6s ease;
    }

    .icon-success {
      font-size: 50px;
      color: #22c55e;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 24px;
      color: #facc15;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    .info {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .alert {
      background: #020617;
      border: 1px solid #facc15;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      color: #facc15;
      margin-bottom: 20px;
    }

    .btn {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 10px;
      transition: 0.3s;
    }

    .instagram {
      background: #e1306c;
      color: #fff;
    }

    .instagram:hover {
      background: #c72b63;
    }

    .whatsapp {
      background: #25d366;
      color: #fff;
    }

    .whatsapp:hover {
      background: #1ebe5d;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">

      <div class="icon-success">
        <i class="fas fa-check-circle"></i>
      </div>

      <h1>Inscrição concluída!</h1>

      <p class="subtitle">
        Você garantiu sua vaga no <strong>Curso de Manutenção de Celular</strong>
      </p>

      <p class="info">
        Em breve entraremos em contato com você com mais informações.
      </p>

      <div class="alert">
        ⚠️ Fique atento ao seu WhatsApp para não perder nenhuma atualização
      </div>

      <a href="https://www.instagram.com/luiz_c137/" target="_blank" class="btn instagram">
        <i class="fab fa-instagram"></i> Seguir no Instagram
      </a>

      <a href="https://wa.me/5581993779019" target="_blank" class="btn whatsapp">
        <i class="fab fa-whatsapp"></i> Falar no WhatsApp
      </a>

    </div>
  </div>

</body>
</html>
